<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>こうきくんのあそびば</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #fff9f0;
    min-height: 100vh;
    overflow: hidden;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body.home-open {
    overflow: auto;
  }

  /* ===== ホーム画面 ===== */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    gap: 20px;
    padding: 30px 0 40px;
    overflow-y: auto;
    background: linear-gradient(160deg, #1a3a5c 0%, #1e6fa8 45%, #00b4d8 100%);
  }
  #home h1 {
    font-size: clamp(30px, 9vw, 54px);
    color: #ffffff;
    letter-spacing: 3px;
    text-align: center;
    line-height: 1.3;
    text-shadow:
      3px 3px 0 #0a2540,
      0 0 20px rgba(0,180,216,0.8);
    font-weight: 900;
  }
  #home-subtitle {
    font-size: clamp(16px, 4.5vw, 24px);
    color: #7dd8f8;
    letter-spacing: 5px;
    font-weight: bold;
    margin-top: -18px;
  }
  .mode-btn {
    width: min(80vw, 320px);
    padding: 28px 20px;
    border: none;
    border-radius: 30px;
    font-size: clamp(22px, 6vw, 34px);
    font-weight: bold;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 2px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(0,0,0,0.1);
  }
  .mode-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.15); }

  /* ===== ピアノページ ===== */
  #piano-page { background: #f5f0ff; }
  #piano-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 16px;
    overflow: hidden;
  }
  #piano-note-display {
    font-size: clamp(36px, 10vw, 60px);
    font-weight: bold;
    color: #7c5cbf;
    letter-spacing: 4px;
    min-height: 70px;
    text-align: center;
  }
  #piano-keys {
    position: relative;
    display: flex;
    touch-action: none;
    user-select: none;
  }
  .p-white {
    border: none;
    border-radius: 0 0 12px 12px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.18);
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 8px;
    z-index: 1;
    border: 1.5px solid #ccc;
    border-top: none;
  }
  .p-white:active, .p-white.pressed {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.18);
  }
  .p-black {
    position: absolute;
    border: none;
    border-radius: 0 0 8px 8px;
    cursor: pointer;
    background: #222;
    box-shadow: 0 5px 0 #000;
    transition: transform 0.08s, box-shadow 0.08s;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 6px;
    color: white;
  }
  .p-black:active, .p-black.pressed {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #000;
  }
  .key-emoji  { line-height: 1; }
  .key-label  { font-size: clamp(9px, 2.5vw, 13px); opacity: 0.75; margin-top: 3px; font-weight: bold; }

  /* ===== ロック機能 ===== */
  #lock-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #lock-overlay.show { display: flex; }
  #lock-icon { font-size: 72px; animation: lockBounce 1.5s ease infinite alternate; }
  @keyframes lockBounce { from{transform:scale(1)} to{transform:scale(1.1)} }
  #lock-msg {
    font-size: clamp(20px,6vw,30px); color:#fff;
    font-weight:bold; letter-spacing:3px; text-align:center;
  }
  #lock-pin-dots {
    display:flex; gap:16px;
  }
  .pin-dot {
    width:22px; height:22px; border-radius:50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.7);
    transition: background 0.15s;
  }
  .pin-dot.filled { background: #FFD700; border-color:#FFD700; }
  #lock-numpad {
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
    margin-top:8px;
  }
  .pin-btn {
    width: clamp(70px,18vw,90px); height: clamp(70px,18vw,90px);
    border-radius:50%; border:none;
    background: rgba(255,255,255,0.15);
    color:white; font-size:clamp(24px,7vw,36px); font-weight:bold;
    cursor:pointer; backdrop-filter:blur(4px);
    transition: background 0.1s, transform 0.1s;
  }
  .pin-btn:active { background:rgba(255,255,255,0.4); transform:scale(0.93); }
  #lock-error {
    color:#ff6b6b; font-size:clamp(14px,4vw,18px);
    font-weight:bold; min-height:24px; letter-spacing:2px;
  }
  .lock-btn {
    font-size:24px; background:none; border:none; cursor:pointer; padding:8px;
    opacity: 0.7;
  }
  .lock-btn.locked { opacity:1; }

  /* ===== 共通ページ ===== */
  .page { display: none; height: 100vh; flex-direction: column; }
  .page.active { display: flex; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(6px);
  }
  .back-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
  }
  .page-title {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: bold;
    color: #555;
  }

  /* ===== タップ遊びページ ===== */
  #tap-page { background: #fffbe6; }
  #tap-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  #tap-emoji {
    font-size: clamp(100px, 30vw, 200px);
    line-height: 1;
    transition: transform 0.15s;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
  }
  #tap-emoji.pop { animation: pop 0.3s ease; }
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.25) rotate(-5deg); }
    70%  { transform: scale(0.95) rotate(3deg); }
    100% { transform: scale(1); }
  }
  #tap-label {
    margin-top: 20px;
    font-size: clamp(32px, 10vw, 64px);
    font-weight: bold;
    color: #ff6b6b;
    letter-spacing: 6px;
    min-height: 80px;
  }
  #tap-hint {
    font-size: clamp(16px, 4vw, 22px);
    color: #aaa;
    margin-top: 16px;
    letter-spacing: 2px;
  }
  .particle {
    position: absolute;
    pointer-events: none;
    font-size: 30px;
    animation: fly 0.9s ease-out forwards;
  }
  @keyframes fly {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }

  /* ===== 音楽ページ ===== */
  #music-page { background: #f0f4ff; }
  #music-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 14px;
    overflow: auto;
  }
  .music-btn {
    background: white;
    border: none;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    padding: 16px 8px;
    transition: transform 0.1s, box-shadow 0.1s;
    min-height: 110px;
  }
  .music-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.12); }
  .music-btn.playing { animation: pulse 0.4s ease; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  .music-btn .icon { font-size: clamp(32px, 9vw, 52px); }
  .music-btn .name { font-size: clamp(13px, 3.5vw, 18px); font-weight: bold; color: #666; }

  /* ===== モグラ叩きページ ===== */
  #whack-page { background: linear-gradient(180deg, #87ceeb 0%, #90ee90 60%, #8B6914 100%); }
  #whack-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(0,0,0,0.25);
    color: white;
    font-weight: bold;
    font-size: clamp(16px, 4.5vw, 22px);
    gap: 8px;
    flex-wrap: wrap;
  }
  #whack-hud span { white-space: nowrap; }
  #whack-level-badge {
    background: #FFD700;
    color: #333;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: clamp(14px, 3.5vw, 18px);
  }
  #whack-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 12px;
    align-items: end;
  }
  .whack-hole {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    position: relative;
    cursor: pointer;
  }
  .hole-bg {
    width: 100%;
    aspect-ratio: 1;
    background: radial-gradient(ellipse at 50% 70%, #5a3a00 60%, #3d2600 100%);
    border-radius: 50%;
    box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .chara {
    font-size: clamp(60px, 18vw, 130px);
    line-height: 1;
    position: absolute;
    bottom: -120%;
    transition: bottom 0.18s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    pointer-events: none;
    user-select: none;
  }
  .chara.up   { bottom: -4%; }
  .chara.hit  { animation: squish 0.25s ease forwards; bottom: -4%; }
  @keyframes squish {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.4, 0.6); }
    60%  { transform: scale(0.8, 1.2); }
    100% { transform: scale(1); }
  }
  #whack-levelup {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    gap: 16px;
  }
  #whack-levelup.show { display: flex; }
  #whack-levelup .lvl-emoji { font-size: 80px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
  #whack-levelup .lvl-text { font-size: clamp(28px, 8vw, 48px); font-weight: bold; text-shadow: 0 2px 8px #000; }
  #whack-levelup .lvl-sub  { font-size: clamp(18px, 5vw, 28px); }
  #whack-gameover {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    gap: 20px;
  }
  #whack-gameover.show { display: flex; }
  #whack-gameover .go-title { font-size: clamp(36px, 10vw, 60px); font-weight: bold; }
  #whack-gameover .go-score { font-size: clamp(24px, 7vw, 40px); }
  #whack-gameover .go-btn {
    padding: 18px 48px;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: #ff8fab;
    color: white;
    box-shadow: 0 6px 0 #c0506e;
    cursor: pointer;
  }
  #whack-speed-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 16px;
    background: rgba(0,0,0,0.18);
    font-size: clamp(13px, 3.5vw, 17px);
    color: white;
    font-weight: bold;
  }
  #whack-speed-bar input[type=range] {
    flex: 1;
    accent-color: #FFD700;
    height: 6px;
  }
  .score-pop {
    position: fixed;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    pointer-events: none;
    animation: scoreFly 0.8s ease-out forwards;
    z-index: 50;
  }
  @keyframes scoreFly {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
  }

  /* ===== バルーンタップ ===== */
  #balloon-page { background: linear-gradient(180deg, #87ceeb 0%, #b0e0ff 100%); }
  #balloon-stage { flex:1; position:relative; overflow:hidden; }
  .balloon {
    position: absolute;
    font-size: clamp(54px, 15vw, 90px);
    line-height: 1;
    cursor: pointer;
    animation: floatUp var(--dur) linear forwards;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(var(--rot)); opacity:1; }
    100% { transform: translateY(-110vh) rotate(calc(var(--rot)*-1)); opacity:0.5; }
  }
  .balloon.pop { animation: balloonPop 0.2s ease-out forwards !important; pointer-events:none; }
  @keyframes balloonPop {
    0%   { transform: scale(1.0); opacity:1; }
    30%  { transform: scale(2.4); opacity:1; }
    100% { transform: scale(0);   opacity:0; }
  }
  #balloon-score {
    position: absolute; top:12px; left:50%; transform:translateX(-50%);
    font-size: clamp(22px,6vw,36px); font-weight:bold;
    color:white; text-shadow:0 2px 6px rgba(0,0,0,0.4);
    pointer-events:none; z-index:10; white-space:nowrap;
  }

  /* ===== 数字タッチ ===== */
  #number-page { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  #number-stage {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; padding:20px; cursor:pointer; position:relative; overflow:hidden;
  }
  #number-big {
    font-size: clamp(130px, 38vw, 240px);
    font-weight:900; line-height:1;
    color: #FFD700;
    text-shadow: 0 0 30px rgba(255,215,0,0.7), 4px 4px 0 #a07000;
    transition: transform 0.15s;
  }
  #number-big.pop { animation: numPop 0.35s ease; }
  @keyframes numPop {
    0%  { transform: scale(1); }
    40% { transform: scale(1.3) rotate(-4deg); }
    70% { transform: scale(0.9) rotate(3deg); }
    100%{ transform: scale(1); }
  }
  #number-label {
    font-size: clamp(28px, 8vw, 52px);
    font-weight:bold; color:#fff;
    letter-spacing:6px;
  }
  #number-dots {
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    max-width:90vw;
  }
  .n-dot {
    font-size: clamp(22px,6vw,38px);
    animation: dotBounce 0.4s ease;
  }
  @keyframes dotBounce { 0%{transform:scale(0)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }

  /* ===== 色の名前 ===== */
  #color-page { background: #222; }
  #color-stage {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:24px; padding:24px; cursor:pointer; position:relative; overflow:hidden;
  }
  #color-circle {
    width: min(65vw, 280px);
    height: min(65vw, 280px);
    border-radius: 50%;
    box-shadow: 0 0 60px var(--c, #fff), inset 0 8px 20px rgba(255,255,255,0.25);
    transition: background 0.3s, box-shadow 0.3s;
  }
  #color-circle.pop { animation: colorPop 0.3s ease; }
  @keyframes colorPop {
    0%  { transform: scale(1); }
    40% { transform: scale(1.15); }
    100%{ transform: scale(1); }
  }
  #color-name {
    font-size: clamp(38px, 12vw, 72px);
    font-weight:900; color:#fff;
    letter-spacing:6px;
    text-shadow: 0 0 20px var(--c,#fff), 3px 3px 0 rgba(0,0,0,0.5);
    min-height: 90px; text-align:center;
  }
  #color-hint { font-size:clamp(16px,4vw,22px); color:#aaa; letter-spacing:2px; }

  /* ===== おえかき ===== */
  #draw-page { background: #f8f8f8; }
  #draw-toolbar {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px; background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    overflow-x:auto; flex-shrink:0;
  }
  .color-swatch {
    width: clamp(34px,9vw,48px); height: clamp(34px,9vw,48px);
    border-radius:50%; border:3px solid transparent;
    cursor:pointer; flex-shrink:0;
    transition: transform 0.1s, border-color 0.1s;
  }
  .color-swatch.active { border-color:#333; transform:scale(1.2); }
  #draw-clear {
    margin-left:auto; padding:8px 18px; border:none;
    border-radius:20px; background:#ff6b6b; color:white;
    font-size:clamp(14px,3.5vw,18px); font-weight:bold; cursor:pointer;
    flex-shrink:0;
  }
  #draw-size {
    width:80px; accent-color:#333; flex-shrink:0;
  }
  #draw-canvas {
    flex:1; width:100%; display:block;
    touch-action:none; cursor:crosshair;
  }

  /* ===== ホームボタン色 ===== */
  #btn-balloon { background: linear-gradient(135deg,#ff6b9d,#ff9eb5); color: white; }
  #btn-number  { background: linear-gradient(135deg,#f9a825,#ffcc02); color: white; }
  #btn-color   { background: linear-gradient(135deg,#ab47bc,#e040fb); color: white; }
  #btn-draw    { background: linear-gradient(135deg,#26c6da,#00e5ff); color: white; }
  #btn-tap     { background: linear-gradient(135deg,#ff8fab,#ffb3c6); color: white; }
  #btn-music   { background: linear-gradient(135deg,#4fc3f7,#81d4fa); color: white; }
  #btn-piano   { background: linear-gradient(135deg,#66bb6a,#a5d6a7); color: white; }
  #btn-whack   { background: linear-gradient(135deg,#ffa726,#ffcc80); color: white; }
  #btn-animal  { background: linear-gradient(135deg,#26a69a,#80cbc4); color: white; }
  #btn-food    { background: linear-gradient(135deg,#ef6c00,#ffa726); color: white; }
  #btn-word    { background: linear-gradient(135deg,#e91e63,#f48fb1); color: white; }

  /* ===== どうぶつ・たべものグリッド ===== */
  #animal-page { background: linear-gradient(160deg, #e8f5e9 0%, #a5d6a7 100%); }
  #food-page   { background: linear-gradient(160deg, #fff8e1 0%, #ffcc80 100%); }
  #animal-grid, #food-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
    overflow-y: auto;
  }
  .animal-btn, .food-btn {
    background: white;
    border: none;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.12);
    padding: 10px 6px;
    min-height: 96px;
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  .animal-btn:active, .food-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.12);
  }
  .animal-btn.bump, .food-btn.bump { animation: bumpPop 0.35s ease; }
  @keyframes bumpPop {
    0%  { transform: scale(1); }
    40% { transform: scale(1.18) rotate(-4deg); }
    70% { transform: scale(0.95) rotate(2deg); }
    100%{ transform: scale(1); }
  }
  .a-icon, .f-icon { font-size: clamp(34px, 9vw, 54px); line-height: 1; }
  .a-name, .f-name {
    font-size: clamp(12px, 3vw, 16px);
    font-weight: bold;
    color: #555;
    letter-spacing: 1px;
    text-align: center;
  }

  /* ===== はじめてのことば ===== */
  #word-page { background: #1a1a2e; }
  #word-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.5s;
  }
  #word-big {
    font-size: clamp(52px, 15vw, 108px);
    font-weight: 900;
    line-height: 1.1;
    color: white;
    text-align: center;
    letter-spacing: 6px;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.4), 0 0 40px rgba(255,255,255,0.25);

// ===================================================
// Web Audio
// ===================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, gain, duration, type="sine", detune=0) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (detune) osc.detune.setValueAtTime(detune, ctx.currentTime);
  gainNode.gain.setValueAtTime(gain, ctx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playItemSound([freq, gain, dur]) {
  playTone(freq, gain, dur, "sine");
  playTone(freq * 1.5, gain * 0.3, dur * 0.7, "sine", 5);
}

function playMusicSound(type, [freq, gain, dur]) {
  if (type === "drum") {
    playTone(80,  gain, 0.3, "sine");
    playTone(200, gain*0.8, 0.1, "triangle");
  } else if (type === "bell") {
    [1,2,3,4].forEach((m,i) => playTone(freq*m, gain/(i+1), dur, "sine"));
  } else if (type === "sparkle") {
    [0,0.1,0.2,0.3].forEach(t => {
      setTimeout(()=>playTone(freq + Math.random()*400, gain*0.5, dur*0.5, "sine"), t*1000);
    });
  } else if (type === "song") {
    const notes = [261,293,330,349,392];
    notes.forEach((n,i) => {
      setTimeout(()=>playTone(n, gain, 0.3, "sine"), i*200);
    });
  } else if (type === "guitar") {
    playTone(freq, gain, dur, "sawtooth");
    playTone(freq*2, gain*0.4, dur*0.7, "sine");
  } else if (type === "trumpet") {
    playTone(freq, gain, dur, "square");
    setTimeout(()=>playTone(freq*1.5, gain*0.5, dur*0.5, "square"), 80);
  } else {
    playTone(freq, gain, dur, "sine");
    playTone(freq*1.5, gain*0.3, dur*0.6, "sine");
  }
}

// ===== 動物の鳴き声 =====
function playAnimalSound(type) {
  const ctx = getAudio();
  const now = ctx.currentTime;

  function tone(freq1, freq2, gain, dur, waveType, delay) {
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = waveType || 'sine';
    osc.frequency.setValueAtTime(freq1, now + (delay||0));
    if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, now + (delay||0) + dur * 0.8);
    gn.gain.setValueAtTime(gain, now + (delay||0));
    gn.gain.exponentialRampToValueAtTime(0.001, now + (delay||0) + dur);
    osc.start(now + (delay||0));
    osc.stop(now + (delay||0) + dur + 0.05);
  }

// 日本語音声リストをキャッシュ
let jaVoices = [];
function loadVoices() {
  const all = window.speechSynthesis.getVoices();
  jaVoices = all.filter(v => v.lang && v.lang.startsWith("ja"));
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice() {
  if (!jaVoices.length) return null;
  const prefer = ["O-ren","Kyoko","Otoya","Hattori","Google 日本語","Microsoft Haruka"];
  for (const name of prefer) {
    const v = jaVoices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return jaVoices[0];
}

function speakWord(word) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const doSpeak = () => {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = "ja-JP";
    utter.rate = 0.72;
    utter.pitch = 1.3;
    const voice = pickVoice();
    if (voice) utter.voice = voice;
    window.speechSynthesis.speak(utter);
  };

  if (jaVoices.length) {
    doSpeak();
  } else {
    const handler = () => { loadVoices(); doSpeak(); window.speechSynthesis.onvoiceschanged = null; };
    window.speechSynthesis.onvoiceschanged = handler;
    setTimeout(doSpeak, 300);
  }
}

function spawnParticles(e) {
  const stage = document.getElementById("tap-stage");
  const rect = stage.getBoundingClientRect();
  const cx = e && e.clientX ? e.clientX - rect.left : rect.width/2;
  const cy = e && e.clientY ? e.clientY - rect.top  : rect.height/2;

  for (let i = 0; i < 8; i++) {
    const el = document.createElement("div");
    el.className = "particle";
    el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    const angle = (Math.PI * 2 / 8) * i;
    const dist = 80 + Math.random() * 60;
    el.style.left = cx + "px";
    el.style.top  = cy + "px";
    el.style.setProperty("--tx", Math.cos(angle)*dist + "px");
    el.style.setProperty("--ty", Math.sin(angle)*dist + "px");
    stage.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
}

// 汎用パーティクル（座標指定）
function spawnParticlesAt(x, y, container) {
  for (let i = 0; i < 7; i++) {
    const el = document.createElement("div");
    el.className = "particle";
    el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    const angle = (Math.PI * 2 / 7) * i;
    const dist = 60 + Math.random() * 50;
    el.style.left = x + "px";
    el.style.top  = y + "px";
    el.style.setProperty("--tx", Math.cos(angle)*dist + "px");
    el.style.setProperty("--ty", Math.sin(angle)*dist + "px");
    el.style.position = "fixed";
    el.style.zIndex = "999";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
}

let bgmActive  = false;
let bgmTimeout = null;
let bgmPattern = null;
let bgmNoteIdx = 0;
let bgmNextTime = 0;

function stopBgMusic() {
  bgmActive = false;
  if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
}

function startBgMusic(type) {
  stopBgMusic();
  bgmPattern  = BGM_PATTERNS[type];
  bgmNoteIdx  = 0;
  bgmActive   = true;
  const ctx   = getAudio();
  bgmNextTime = ctx.currentTime + 0.15;
  scheduleBgm();
}

function scheduleBgm() {
  if (!bgmActive) return;
  const ctx   = getAudio();
  const ahead = 0.35;

  while (bgmNextTime < ctx.currentTime + ahead) {
    const [freq, dur] = bgmPattern.notes[bgmNoteIdx % bgmPattern.notes.length];
    bgmNoteIdx++;

    if (freq > 0) {
      const osc = ctx.createOscillator();
      const gn  = ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination);
      osc.type = bgmPattern.wave;
      osc.frequency.setValueAtTime(freq, bgmNextTime);
      gn.gain.setValueAtTime(bgmPattern.gain, bgmNextTime);
      gn.gain.exponentialRampToValueAtTime(0.001, bgmNextTime + dur * 0.85);
      osc.start(bgmNextTime);
      osc.stop(bgmNextTime + dur);
    }

    bgmNextTime += dur;
  }

  bgmTimeout = setTimeout(scheduleBgm, 100);
}

function playPianoKey(freq) {
  const ctx = getAudio();
  [[1,0.6],[2,0.2],[3,0.1],[4,0.05]].forEach(([mult, g]) => {
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * mult, ctx.currentTime);
    gn.gain.setValueAtTime(g, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.5);
  });
}

function buildPianoKeys() {
  const wrap = document.getElementById("piano-keys");

  const wKeyH = Math.min(Math.floor(wKeyW * 3.2), 240);

  const totalW = WN * wKeyW + (WN - 1) * gap;

  wrap.style.height = wKeyH + "px";

  });
}

  pop.className = "score-pop";
  const touch = e.touches ? e.touches[0] : e;
  pop.style.left = (touch.clientX - 20) + "px";
  pop.style.top  = (touch.clientY - 30) + "px";
  pop.textContent = whackCombo >= 3 ? `✨+${whackCombo}コンボ！` : "+1";
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 800);

  playTone(600, 0.5, 0.15, "sine");
  playTone(900, 0.3, 0.1,  "sine");

  document.getElementById("whack-score").textContent = whackScore;
  if (whackCombo >= 3) document.getElementById("whack-combo").textContent = `🔥 ${whackCombo}れんぞく！`;

  const lv = getLevel();
  if (whackHits >= lv.hitTarget) {
    whackLevelUp();
  }
}

function whackLevelUp() {
  if (whackLevel >= WHACK_LEVELS.length - 1) return;
  clearWhackLoop();
  whackLevel++;
  whackHits = 0;
  const lv = getLevel();

  document.getElementById("lvl-text").textContent = lv.label + " アップ！";
  document.getElementById("lvl-sub").textContent  = lv.sub;
  const lvup = document.getElementById("whack-levelup");
  lvup.classList.add("show");

  [400,500,600,800].forEach((f,i) => setTimeout(()=>playTone(f,0.4,0.2,"sine"), i*100));

  setTimeout(() => {
    lvup.classList.remove("show");
    document.getElementById("whack-level-badge").textContent = lv.label;
    resumeWhackLoop();
  }, 1800);
}

function startWhack() {
  document.getElementById("whack-gameover").classList.remove("show");
  document.getElementById("whack-levelup").classList.remove("show");
  stopWhack();

  whackScore  = 0;
  whackLevel  = 0;
  whackHits   = 0;
  whackCombo  = 0;
  whackActive = true;
  whackGameTime = 60;
  whackUpStates = new Array(HOLES).fill(false);

  document.getElementById("whack-score").textContent = "0";
  document.getElementById("whack-combo").textContent = "";
  document.getElementById("whack-level-badge").textContent = "レベル 1";

  buildWhackGrid();
  resumeWhackLoop();
  startBgMusic('whack');

  whackCountdown = setInterval(() => {
    whackGameTime--;
    if (whackGameTime <= 0) {
      clearInterval(whackCountdown);
      endWhack();
    }
  }, 1000);
}

function resumeWhackLoop() {
  const lv = getLevel();
  const mult = speedMult();
  const interval = Math.round(lv.interval * mult);
  const upTime   = Math.round(lv.upTime   * mult);

  whackLoop = setInterval(() => {
    if (!whackActive) return;
    const numPop = whackLevel >= 3 ? 2 : 1;
    const candidates = [];
    for (let i = 0; i < HOLES; i++) if (!whackUpStates[i]) candidates.push(i);
    candidates.sort(() => Math.random()-0.5);
    candidates.slice(0, numPop).forEach(idx => popChara(idx, upTime));
  }, interval);
}

function popChara(idx, upTime) {
  const charas = document.querySelectorAll(".chara");
  if (!charas[idx]) return;
  const el = charas[idx];

  el.textContent = WHACK_CHARAS[Math.floor(Math.random() * WHACK_CHARAS.length)];

  whackUpStates[idx] = true;
  el.classList.remove("hit");
  el.classList.add("up");

  whackTimers[idx] = setTimeout(() => {
    if (whackUpStates[idx]) {
      whackUpStates[idx] = false;
      el.classList.remove("up");
      whackCombo = 0;
      document.getElementById("whack-combo").textContent = "";
    }
  }, upTime);
}

function clearWhackLoop() {
  if (whackLoop) { clearInterval(whackLoop); whackLoop = null; }
  whackTimers.forEach(t => clearTimeout(t));
  whackTimers = [];
}

function stopWhack() {
  whackActive = false;
  clearWhackLoop();
  if (whackCountdown) { clearInterval(whackCountdown); whackCountdown = null; }
  stopBgMusic();
}

function endWhack() {
  stopWhack();
  document.querySelectorAll(".chara").forEach(el => el.classList.remove("up","hit"));
  document.getElementById("go-score").textContent = whackScore;
  document.getElementById("go-level").textContent = whackLevel + 1;
  document.getElementById("whack-gameover").classList.add("show");
  [800,600,400,300].forEach((f,i) => setTimeout(()=>playTone(f,0.3,0.2,"sine"), i*150));
}

const BALLOONS = ["🎈","🎀","🌸","⭐","🌟","🍭","🌈","🎊","💛","💙","❤️","💜"];
const BURST_COLORS = [
  "#ff4757","#ffa502","#ffdd59","#7bed9f","#70a1ff",
  "#ff6b81","#eccc68","#a29bfe","#fd79a8","#00d2d3"
];
let balloonScore = 0;
let balloonTimer = null;
let balloonActive = false;

// バルーン破裂音
function playBalloonPop() {
  const ctx = getAudio();
  const now = ctx.currentTime;
  // 複数周波数の短いバースト → 「パン！」という音
  [160, 320, 640, 1100, 2400].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = i < 2 ? "triangle" : "sawtooth";
    osc.frequency.setValueAtTime(f, now);
    osc.frequency.exponentialRampToValueAtTime(f * 0.04, now + 0.07);
    gn.gain.setValueAtTime(0.28 / (i * 0.6 + 1), now);
    gn.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.12);
  });
  // 空気が抜けるシュー音
  const hiss = ctx.createOscillator();
  const hGn  = ctx.createGain();
  hiss.connect(hGn); hGn.connect(ctx.destination);
  hiss.type = "sawtooth";
  hiss.frequency.setValueAtTime(3800, now + 0.02);
  hiss.frequency.exponentialRampToValueAtTime(180, now + 0.22);
  hGn.gain.setValueAtTime(0.07, now + 0.02);
  hGn.gain.exponentialRampToValueAtTime(0.001, now + 0.24);
  hiss.start(now + 0.02);
  hiss.stop(now + 0.26);
}

// 破片パーティクル（JS transition 駆動 — iOS Safari でも確実に動く）
function spawnBurstParticles(cx, cy, color) {
  // ① 衝撃波フラッシュ
  const flash = document.createElement("div");
  flash.style.cssText = `
    position:fixed; left:${cx}px; top:${cy}px;
    width:40px; height:40px; border-radius:50%;
    background:radial-gradient(circle, #fff 0%, ${color} 45%, transparent 100%);
    pointer-events:none; z-index:502;
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
    transition:transform 0.22s ease-out, opacity 0.22s ease-out;
  `;
  document.body.appendChild(flash);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    flash.style.transform = "translate(-50%,-50%) scale(14)";
    flash.style.opacity   = "0";
  }));
  setTimeout(() => flash.remove(), 280);

  // ② カラフルな破片（24個・大きめ）
  const PIECE_COUNT = 24;
  for (let i = 0; i < PIECE_COUNT; i++) {
    const el       = document.createElement("div");
    const angle    = (Math.PI * 2 / PIECE_COUNT) * i + (Math.random() - 0.5) * 0.4;
    const dist     = 160 + Math.random() * 200;
    const size     = 44 + Math.random() * 44;   // 44〜88px
    const durMs    = 550 + Math.random() * 350;
    const isCircle = Math.random() > 0.45;
    const c        = Math.random() > 0.3
                     ? color
                     : BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
    const tx  = Math.cos(angle) * dist;
    const ty  = Math.sin(angle) * dist;
    const rot = (Math.random() - 0.5) * 720;

    el.style.cssText = `
      position:fixed;
      left:${cx - size / 2}px; top:${cy - size / 2}px;
      width:${size}px; height:${size}px;
      background:${c};
      border-radius:${isCircle ? "50%" : "8px"};
      box-shadow:0 6px 18px rgba(0,0,0,0.4);
      pointer-events:none; z-index:500;
      opacity:1;
      transform:scale(1) translate(0px,0px) rotate(0deg);
      transition:transform ${durMs}ms cubic-bezier(0.05,0.9,0.3,1),
                 opacity   ${durMs * 0.5}ms ease-in ${durMs * 0.5}ms;
    `;
    document.body.appendChild(el);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translate(${tx}px,${ty}px) scale(0.08) rotate(${rot}deg)`;
      el.style.opacity   = "0";
    }));
    setTimeout(() => el.remove(), durMs + 60);
  }

  // ③ 絵文字パーティクル（8個・大きめ）
  const EMOJI_SET = ["✨","⭐","💥","🎊","🌟","🎉","💛","🌈"];
  for (let i = 0; i < 8; i++) {
    const el    = document.createElement("div");
    const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.3;
    const dist  = 120 + Math.random() * 100;
    const size  = 52 + Math.random() * 36;      // 52〜88px
    const durMs = 650 + Math.random() * 300;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 30;

    el.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      font-size:${size}px; line-height:1;
      pointer-events:none; z-index:501;
      opacity:1;
      transform:translate(-50%,-50%) scale(1.4);
      transition:transform ${durMs}ms ease-out,
                 opacity   ${durMs * 0.55}ms ease-in ${durMs * 0.45}ms;
    `;
    el.textContent = EMOJI_SET[i % EMOJI_SET.length];
    document.body.appendChild(el);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.15)`;
      el.style.opacity   = "0";
    }));
    setTimeout(() => el.remove(), durMs + 60);
  }
}

function startBalloon() {
  balloonScore = 0;
  balloonActive = true;
  document.getElementById("balloon-score").textContent = "⭐ 0";
  document.getElementById("balloon-stage").querySelectorAll(".balloon").forEach(b=>b.remove());
  startBgMusic('balloon');
  spawnBalloon();
}

function stopBalloon() {
  balloonActive = false;
  if (balloonTimer) { clearTimeout(balloonTimer); balloonTimer = null; }
  stopBgMusic();
}

function spawnBalloon() {
  if (!balloonActive) return;
  const stage = document.getElementById("balloon-stage");
  const b = document.createElement("div");
  b.className = "balloon";
  const emoji = BALLOONS[Math.floor(Math.random() * BALLOONS.length)];
  b.textContent = emoji;
  const x   = 5 + Math.random() * 80;
  const dur = 3.5 + Math.random() * 3;
  const rot = (Math.random() - 0.5) * 30;
  // バルーンごとにランダムな色を割り当て
  const burstColor = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
  b.style.cssText = `left:${x}vw; bottom:-15%; --dur:${dur}s; --rot:${rot}deg;`;

  const pop = (e) => {
    if (b.dataset.popped) return;
    b.dataset.popped = "1";
    e.stopPropagation();

    // ① アニメ切替前に現在位置を取得（これより前に DOM を触らない）
    const rect = b.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    // ② バルーンはその場で即消す（animationを切り替えると底に戻るため使わない）
    b.style.opacity = "0";
    b.style.pointerEvents = "none";

    // ③ スコア更新・エフェクト
    balloonScore++;
    document.getElementById("balloon-score").textContent = "⭐ " + balloonScore;
    playBalloonPop();
    spawnBurstParticles(cx, cy, burstColor);

    setTimeout(() => b.remove(), 800);
  };
  b.addEventListener("touchstart", e => { e.preventDefault(); pop(e); }, { passive:false });
  b.addEventListener("mousedown", pop);
  b.addEventListener("animationend", () => { if (!b.dataset.popped) b.remove(); });

  stage.appendChild(b);

  const interval = 900 + Math.random() * 600;
  balloonTimer = setTimeout(spawnBalloon, interval);
}

// おえかき
// ===================================================
let drawCtx = null;
let isDrawing = false;
let drawColor = "#ff4444";

function initCanvas() {
  const canvas = document.getElementById("draw-canvas");
  const toolbar = document.getElementById("draw-toolbar");
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - toolbar.offsetHeight - 60;
  drawCtx = canvas.getContext("2d");
  drawCtx.fillStyle = "#ffffff";
  drawCtx.fillRect(0, 0, canvas.width, canvas.height);
  drawCtx.lineCap   = "round";
  drawCtx.lineJoin  = "round";

  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX - r.left, t.clientY - r.top];
  };

  canvas.addEventListener("touchstart", e => {
    e.preventDefault(); isDrawing = true;
    const [x,y] = getPos(e);
    drawCtx.beginPath(); drawCtx.moveTo(x,y);
  }, { passive:false });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault(); if (!isDrawing) return;
    const [x,y] = getPos(e);
    drawCtx.strokeStyle = drawColor;
    drawCtx.lineWidth = parseInt(document.getElementById("draw-size").value);
    drawCtx.lineTo(x,y); drawCtx.stroke();
  }, { passive:false });

  canvas.addEventListener("touchend", () => { isDrawing = false; });

  canvas.addEventListener("mousedown", e => {
    isDrawing = true;
    const [x,y] = getPos(e);
    drawCtx.beginPath(); drawCtx.moveTo(x,y);
  });
  canvas.addEventListener("mousemove", e => {
    if (!isDrawing) return;
    const [x,y] = getPos(e);
    drawCtx.strokeStyle = drawColor;
    drawCtx.lineWidth = parseInt(document.getElementById("draw-size").value);
    drawCtx.lineTo(x,y); drawCtx.stroke();
  });
  canvas.addEventListener("mouseup",   () => { isDrawing = false; });
  canvas.addEventListener("mouseleave",() => { isDrawing = false; });
}

function setDrawColor(el) {
  drawColor = el.dataset.color;
  document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
}

function clearCanvas() {
  if (!drawCtx) return;
  const canvas = document.getElementById("draw-canvas");
  drawCtx.fillStyle = "#ffffff";
  drawCtx.fillRect(0, 0, canvas.width, canvas.height);
}

// ===================================================
// ロック機能
// ===================================================
const LOCK_PIN = "0000";
let isLocked   = false;
let pinBuffer  = "";

function toggleLock() {
  if (isLocked) {
    showLockOverlay();
  } else {
    isLocked = true;
    updateLockBtns();
    setBackBtnsDisabled(true);
  }
}

function updateLockBtns() {
  document.querySelectorAll(".lock-btn").forEach(b => {
    b.textContent = isLocked ? "🔒" : "🔓";
    b.classList.toggle("locked", isLocked);
  });
  document.querySelectorAll(".back-btn").forEach(b => {
    b.style.opacity = isLocked ? "0.3" : "1";
    b.style.pointerEvents = isLocked ? "none" : "auto";
  });
}

function setBackBtnsDisabled(disabled) {
  document.querySelectorAll(".back-btn").forEach(b => {
    b.style.opacity = disabled ? "0.3" : "1";
    b.style.pointerEvents = disabled ? "none" : "auto";
  });
}

function showLockOverlay() {
  pinBuffer = "";
  updateDots();
  document.getElementById("lock-error").textContent = "";
  document.getElementById("lock-overlay").classList.add("show");
}

function pinInput(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updateDots();
  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 200);
  }
}

function pinBackspace() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
  document.getElementById("lock-error").textContent = "";
}

function pinClear() {
  pinBuffer = "";
  updateDots();
  document.getElementById("lock-error").textContent = "";
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("dot" + i).classList.toggle("filled", i < pinBuffer.length);
  }
}

function checkPin() {
  if (pinBuffer === LOCK_PIN) {
    isLocked = false;
    pinBuffer = "";
    document.getElementById("lock-overlay").classList.remove("show");
    updateLockBtns();
    [400, 600, 800].forEach((f,i) => setTimeout(()=>playTone(f,0.3,0.15,"sine"), i*80));
  } else {
    document.getElementById("lock-error").textContent = "❌ ちがいます";
    pinBuffer = "";
    updateDots();
    playTone(200, 0.4, 0.3, "sawtooth");
    const overlay = document.getElementById("lock-overlay");
    overlay.style.animation = "none";
    overlay.style.transform = "translateX(-12px)";
    setTimeout(() => { overlay.style.transition="transform 0.3s ease"; overlay.style.transform=""; }, 50);
    setTimeout(() => { overlay.style.transition=""; }, 400);
  }
}
